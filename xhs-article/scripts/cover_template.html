<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@400;700;900&family=Playfair+Display:wght@700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1800px;
  background: #f5f0e8;
  font-family: 'Noto Serif SC', serif;
  overflow: hidden; position: relative;
}
.texture {
  position: absolute; inset: 0; opacity: 0.4; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.15'/%3E%3C/svg%3E");
  background-size: 256px;
}
.col-line {
  position: absolute; left: 50%; top: 160px; bottom: 160px;
  width: 1px; background: rgba(0,0,0,0.05); z-index: 1;
}
.container {
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
  height: 100%;
  padding: 24px 80px 80px;
}
.header {
  display: flex; justify-content: space-between; align-items: center;
  padding-bottom: 16px; border-bottom: 1px solid #ccc;
}
.header-left {
  display: flex; align-items: center; gap: 16px;
}
.masthead {
  font-family: 'Playfair Display', serif;
  font-size: 36px; font-weight: 900;
  letter-spacing: 10px; color: #111;
  text-transform: uppercase;
}
.tag {
  display: inline-flex; align-items: center; justify-content: center;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 20px; font-weight: 700;
  color: white; background: #b91c1c;
  padding: 2px 14px 4px;
  line-height: 1.4;
}
.date {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 20px; color: #999;
}
.source {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 22px; color: #777;
  margin-top: 20px;
}
.hero {
  flex: 1; display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  text-align: center;
}
.big-number-row {
  display: flex; align-items: baseline; justify-content: center;
}
.big-number {
  font-family: 'Playfair Display', serif;
  font-size: 220px; font-weight: 900;
  color: #111; line-height: 0.9;
  letter-spacing: -6px;
}
.big-unit {
  font-family: 'Playfair Display', serif;
  font-size: 150px; font-weight: 900;
  color: #b91c1c; line-height: 0.9;
  margin-left: 4px;
}
.data-line {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 34px; font-weight: 400;
  color: #777; margin-top: 20px;
}
.data-line em {
  font-style: normal;
  color: #b91c1c; font-weight: 700;
}
.main-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 82px; font-weight: 900;
  color: #111; line-height: 1.25;
  margin-top: 60px;
}
.subtitle {
  font-family: 'Noto Serif SC', serif;
  font-size: 60px; font-weight: 700;
  color: #444; font-style: italic;
  line-height: 1.5; margin-top: 40px;
  padding: 0 20px;
}
.subtitle em {
  font-style: italic;
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  color: #333;
}
.bottom {
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-top: auto; padding-top: 24px;
}
.byline {
  display: flex; align-items: baseline; gap: 12px;
}
.byline-label {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 36px; color: #888;
}
.byline-name {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 44px; font-weight: 900; color: #333;
}
.deco-page {
  font-family: 'Playfair Display', serif;
  font-size: 128px; font-weight: 900;
  color: rgba(0,0,0,0.05); line-height: 1;
}
</style>
</head>
<body>
<div class="texture"></div>
<div class="col-line"></div>
<div class="container">
  <div class="header">
    <div class="header-left">
      <span class="masthead">Deep Dive</span>
      <span class="tag">深度</span>
    </div>
    <div class="date">{{DATE}}</div>
  </div>
  <div class="source">{{SOURCE}}</div>

  <div class="hero">
    <div class="big-number-row">
      <span class="big-number">{{BIG_NUMBER}}</span>
      <span class="big-unit">{{BIG_UNIT}}</span>
    </div>
    <div class="data-line">{{DATA_LINE}}</div>
    <div class="main-title">{{MAIN_TITLE}}</div>
    <div class="subtitle">{{SUBTITLE}}</div>
  </div>

  <div class="bottom">
    <div class="byline">
      <span class="byline-label">文</span>
      <span class="byline-name">Ody</span>
    </div>
    <div class="deco-page">01</div>
  </div>
</div>
</body>
</html>
